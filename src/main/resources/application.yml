spring:
  application:
    name: EventClean

  datasource:
    url: jdbc:postgresql://localhost:5431/eventclean
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      show-sql: true
      hibernate:
          ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    # linha desnecessária, pois o Flyway já procura por padrão em classpath:db/migration
